# Dedicated ServiceAccount for the Kafka consumer Deployment, for least-privilege RBAC
# (kubernetes-deployment-best-practices.instructions.md §Security) - kept plain for now
# since Key Vault / Workload Identity sourcing of secrets was skipped (see secret.yaml).
# If Key Vault-backed secrets or Workload-Identity-authenticated Azure SDK calls are added
# later, add the azure.workload.identity/client-id and .../tenant-id annotations back here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-consumer-sa
  labels:
    app: kafka-consumer
